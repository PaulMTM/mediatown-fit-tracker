
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediaTown Fit Tracker</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
background:#f5f6f7;
margin:0;
padding:20px;
color:#111;
}
.container{
max-width:900px;
margin:auto;
}
.card{
background:white;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.05);
}
h1{
margin-top:0;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
input,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}
button{
background:#95BF47;
border:none;
padding:14px 18px;
border-radius:999px;
font-weight:700;
cursor:pointer;
}
.small{
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>MediaTown Fit Tracker</h1>
<p class="small">Simple daily discipline tracker. No login. Your data stays on your device.</p>
</div>

<div class="card">
<h2>Daily Checklist</h2>
<label><input type="checkbox" id="workout"> Workout completed</label><br>
<label><input type="checkbox" id="walk"> Walk after dinner</label><br>
<label><input type="checkbox" id="protein"> Protein focused meals</label><br>
<label><input type="checkbox" id="cutoff"> Stopped eating on time</label>
</div>

<div class="card">
<h2>Daily Log</h2>

<div class="grid">
<div>
<label>Water (litres)</label>
<input type="number" id="water">
</div>

<div>
<label>Steps</label>
<input type="number" id="steps">
</div>

<div>
<label>Sleep (hours)</label>
<input type="number" id="sleep">
</div>

<div>
<label>Waist (cm)</label>
<input type="number" id="waist">
</div>
</div>

<label style="margin-top:10px;display:block;">Notes</label>
<textarea id="notes"></textarea>

<br><br>

<button onclick="save()">Save today</button>
<p class="small" id="status"></p>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
